services:
  - type: web
    name: fire-compliance-report-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"
